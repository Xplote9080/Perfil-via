<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAL — Perfil Ferroviario FEPSA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --cyan:    #00e5ff;
    --green:   #00c853;
    --green2:  #69f0ae;
    --red:     #ff1744;
    --amber:   #ffab00;
    --white:   #e0e0e0;
    --bg:      #050a0e;
    --panel:   #070d12;
    --border:  #0a2a1a;
    --grid:    rgba(0,180,80,0.18);
    --text-dim:#4a7a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    background: #020608;
    border-bottom: 1px solid var(--border);
    padding: 4px 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #topbar .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 0.75em;
    color: var(--cyan);
    letter-spacing: 3px;
  }
  #divSelect, #smoothSel, #windowKm {
    background: #0a1a10;
    color: var(--green2);
    border: 1px solid var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85em;
    padding: 2px 8px;
  }
  #topbar label { color: var(--text-dim); font-size: 0.75em; }
  #status {
    margin-left: auto;
    font-size: 0.7em;
    color: var(--text-dim);
  }
  #statusDot {
    display: inline-block; width:8px; height:8px;
    border-radius:50%; background:var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-right: 4px;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── MAIN ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── LEFT PANEL ── */
  #leftPanel {
    width: 160px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 6px;
    gap: 4px;
  }

  .pbox {
    border: 1px solid var(--border);
    background: #030a06;
    padding: 4px 6px;
  }
  .pbox .label {
    font-size: 0.6em;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .pbox .value {
    font-family: 'Orbitron', monospace;
    font-size: 1.4em;
    font-weight: 700;
    color: var(--white);
    line-height: 1.1;
  }
  .pbox .unit {
    font-size: 0.6em;
    color: var(--text-dim);
    margin-left: 2px;
  }
  .pbox.highlight .value { color: var(--cyan); }
  .pbox.alert .value    { color: var(--red); text-shadow: 0 0 8px var(--red); }
  .pbox.ok .value       { color: var(--green2); }

  #velExceso {
    border-color: var(--red);
    background: #1a0005;
    display: none;
    animation: pulseRed 0.6s infinite alternate;
  }
  @keyframes pulseRed {
    from { border-color: var(--red); }
    to   { border-color: #ff6090; box-shadow: 0 0 8px var(--red); }
  }

  /* Barras de presión */
  .bars-row {
    display: flex;
    gap: 4px;
    margin-top: 2px;
  }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .bar-col .blabel { font-size: 0.55em; color: var(--text-dim); margin-bottom: 2px; }
  .bar-track {
    width: 18px; height: 60px;
    background: #0a1a10;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    position: absolute; bottom: 0; width: 100%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    transition: height 0.3s ease;
  }
  .bar-val { font-size: 0.6em; color: var(--green2); margin-top: 2px; }

  /* ── CANVAS AREA ── */
  #canvasWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  canvas#perfil {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── BOTTOM BAR ── */
  #bottomBar {
    background: #020608;
    border-top: 1px solid var(--border);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #sliderWrap { flex: 1; display: flex; align-items: center; gap: 8px; }
  #sliderKm {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    outline: none;
    border-radius: 2px;
  }
  #sliderKm::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    cursor: pointer;
  }
  #kmLabel {
    font-family: 'Orbitron', monospace;
    font-size: 0.85em;
    color: var(--cyan);
    min-width: 80px;
    text-align: right;
  }
  .btn {
    background: #0a1a10;
    border: 1px solid var(--green);
    color: var(--green2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75em;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #0d2a18; }
  .btn.active { background: #003010; border-color: var(--cyan); color: var(--cyan); }

  #pendienteDisplay {
    font-size: 0.75em;
    color: var(--amber);
    min-width: 80px;
    text-align: center;
  }
  #dirDisplay {
    font-size: 0.7em;
    color: var(--text-dim);
    min-width: 50px;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">LAL</span>
  <label>DIV:</label>
  <select id="divSelect" onchange="onDivChange()"></select>
  <label>IR A:</label>
  <select id="estSelect" onchange="irAEstacion()">
    <option value="">— Estación —</option>
  </select>
  <label>VENTANA:</label>
  <select id="windowKm" onchange="draw()">
    <option value="5">5 km</option>
    <option value="10" selected>10 km</option>
    <option value="20">20 km</option>
    <option value="50">50 km</option>
  </select>
  <label>ESTACIONES:</label>
  <select id="estFontSize" onchange="draw()">
    <option value="8">Chico (8)</option>
    <option value="10" selected>Normal (10)</option>
    <option value="12">Grande (12)</option>
    <option value="14">Muy grande (14)</option>
  </select>
  <label>SUAVIZADO:</label>
  <select id="smoothSel" onchange="draw()">
    <option value="1">Sin suavizar</option>
    <option value="3">Leve (3)</option>
    <option value="7" selected>Medio (7)</option>
    <option value="15">Alto (15)</option>
    <option value="30">Máximo (30)</option>
  </select>
  <span id="status"><span id="statusDot"></span>ONLINE</span>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT PANEL -->
  <div id="leftPanel">
    <div class="pbox highlight">
      <div class="label">DIV</div>
      <div class="value" id="pDiv" style="font-size:1em">—</div>
    </div>
    <div class="pbox highlight">
      <div class="label">Punto Km</div>
      <div class="value" id="pKm">—</div>
    </div>
    <div class="pbox">
      <div class="label">Altitud</div>
      <div class="value" id="pAlt">—<span class="unit">m</span></div>
    </div>
    <div class="pbox" id="pboxPend">
      <div class="label">Pendiente</div>
      <div class="value" id="pPend">—<span class="unit">‰</span></div>
    </div>
    <div class="pbox" id="pboxEstacion" style="display:none">
      <div class="label">Estación</div>
      <div class="value" id="pEstacion" style="font-size:0.65em;color:#ffdd66;line-height:1.2">—</div>
    </div>
    <div style="flex:1"></div>
  </div>

  <!-- CANVAS -->
  <div id="canvasWrap">
    <canvas id="perfil"></canvas>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottomBar">
  <button class="btn" id="btnPlay" onclick="togglePlay()">▶ AUTO</button>
  <button class="btn" onclick="changeSpeed()">VEL: <span id="speedLabel">1×</span></button>
  <div id="sliderWrap">
    <span style="font-size:0.7em;color:var(--text-dim)" id="kmMin">—</span>
    <input type="range" id="sliderKm" oninput="onSlider()" min="0" max="100" value="0">
    <span style="font-size:0.7em;color:var(--text-dim)" id="kmMax">—</span>
  </div>
  <div id="kmLabel">KM —</div>
  <div id="pendienteDisplay">PEND: —</div>
  <div id="dirDisplay">DIR: —</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// DATOS — Se inyectan desde Python o se cargan via fetch
// ─────────────────────────────────────────────────────────────
let TRAZA = null;
let divData = {};
let ESTACIONES = {};  // { DIV: [{nombre, km}, ...] }
let currentDiv = null;
let currentIdx = 0;
let playing = false;
let playSpeed = 1;
let playInterval = null;
const SPEEDS = [1, 2, 5, 10];
let speedIdx = 0;

// ─────────────────────────────────────────────────────────────
// CARGA DE DATOS
// ─────────────────────────────────────────────────────────────
async function loadData() {
  // Intentar cargar traza_fepsa_alt.json primero, luego traza_fepsa.json
  const files = ['traza_fepsa_alt.json', 'traza_fepsa.json'];
  for (const f of files) {
    try {
      const resp = await fetch(f);
      if (!resp.ok) continue;
      TRAZA = await resp.json();
      document.getElementById('status').innerHTML =
        '<span id="statusDot"></span>' + f.replace('.json','').toUpperCase();
      break;
    } catch(e) {}
  }

  if (!TRAZA) {
    // Modo demo con datos sintéticos si no hay archivo
    TRAZA = generarDemo();
    document.getElementById('status').innerHTML =
      '<span id="statusDot"></span>MODO DEMO';
  }

  // Cargar estaciones si existen
  try {
    const r = await fetch('estaciones_fepsa.json');
    if (r.ok) {
      ESTACIONES = await r.json();
      const total = Object.values(ESTACIONES).reduce((s, a) => s + a.length, 0);
      console.log(`Estaciones cargadas: ${total} en ${Object.keys(ESTACIONES).length} DIVs`);
    }
  } catch(e) {
    console.log('Sin archivo de estaciones:', e);
  }

  // Agrupar por DIV y ordenar por KM
  divData = {};
  for (const p of TRAZA) {
    if (!divData[p.DIV]) divData[p.DIV] = [];
    divData[p.DIV].push(p);
  }
  for (const d in divData) {
    divData[d].sort((a,b) => a.KM - b.KM);
  }

  // Poblar selector
  const sel = document.getElementById('divSelect');
  for (const d of Object.keys(divData).sort()) {
    const pts = divData[d];
    const kmMin = pts[0].KM.toFixed(1);
    const kmMax = pts[pts.length-1].KM.toFixed(1);
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = `${d}  (${kmMin}–${kmMax} km)`;
    sel.appendChild(opt);
  }

  onDivChange();
}

function generarDemo() {
  // Perfil sintético si no hay archivo
  const pts = [];
  let alt = 20, km = 0;
  for (let i = 0; i < 500; i++) {
    alt += (Math.random()-0.48)*2;
    alt = Math.max(0, Math.min(200, alt));
    pts.push({ ID: i+1, DIV: 'DEMO', KM: parseFloat((km).toFixed(3)),
               LATITUD: -34.8, LONGITUD: -59.8, ALTITUD: parseFloat(alt.toFixed(1)) });
    km += 0.5 + Math.random()*0.5;
  }
  return pts;
}

// ─────────────────────────────────────────────────────────────
// EVENTOS
// ─────────────────────────────────────────────────────────────
function onDivChange() {
  currentDiv = document.getElementById('divSelect').value;
  currentIdx = 0;
  const pts = divData[currentDiv] || [];
  const slider = document.getElementById('sliderKm');
  slider.min = 0;
  slider.max = pts.length - 1;
  slider.value = 0;
  document.getElementById('kmMin').textContent = pts.length ? pts[0].KM.toFixed(1)+' km' : '—';
  document.getElementById('kmMax').textContent = pts.length ? pts[pts.length-1].KM.toFixed(1)+' km' : '—';

  // Poblar selector de estaciones de esta DIV
  const estSel = document.getElementById('estSelect');
  estSel.innerHTML = '<option value="">— Estación —</option>';
  const ests = (ESTACIONES[currentDiv] || []).slice().sort((a,b) => a.km - b.km);
  for (const e of ests) {
    const opt = document.createElement('option');
    opt.value = e.km;
    opt.textContent = `KM ${e.km.toFixed(1)}  ${e.nombre}`;
    estSel.appendChild(opt);
  }

  draw();
}

function irAEstacion() {
  const sel = document.getElementById('estSelect');
  const km = parseFloat(sel.value);
  if (isNaN(km)) return;
  const pts = divData[currentDiv] || [];
  // Encontrar el índice más cercano a ese KM
  let mejor = 0, mejorDist = Infinity;
  for (let i = 0; i < pts.length; i++) {
    const d = Math.abs(pts[i].KM - km);
    if (d < mejorDist) { mejorDist = d; mejor = i; }
  }
  currentIdx = mejor;
  document.getElementById('sliderKm').value = mejor;
  draw();
  // Resetear el select para que se pueda volver a elegir la misma
  setTimeout(() => { sel.value = ''; }, 300);
}

function onSlider() {
  currentIdx = parseInt(document.getElementById('sliderKm').value);
  draw();
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btnPlay');
  if (playing) {
    btn.textContent = '⏸ PAUSA';
    btn.classList.add('active');
    startPlay();
  } else {
    btn.textContent = '▶ AUTO';
    btn.classList.remove('active');
    stopPlay();
  }
}

function changeSpeed() {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  playSpeed = SPEEDS[speedIdx];
  document.getElementById('speedLabel').textContent = playSpeed + '×';
  if (playing) { stopPlay(); startPlay(); }
}

function startPlay() {
  stopPlay();
  playInterval = setInterval(() => {
    const pts = divData[currentDiv] || [];
    if (currentIdx >= pts.length - 1) {
      currentIdx = 0;
    } else {
      currentIdx += playSpeed;
      if (currentIdx >= pts.length) currentIdx = pts.length - 1;
    }
    document.getElementById('sliderKm').value = currentIdx;
    draw();
  }, 100);
}

function stopPlay() {
  if (playInterval) { clearInterval(playInterval); playInterval = null; }
}

// ─────────────────────────────────────────────────────────────
// DIBUJO PRINCIPAL
// ─────────────────────────────────────────────────────────────
function draw() {
  const canvas = document.getElementById('perfil');
  const wrap   = document.getElementById('canvasWrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const pts = divData[currentDiv] || [];
  if (!pts.length) return;

  const windowKm = parseFloat(document.getElementById('windowKm').value);
  const curPt    = pts[Math.min(currentIdx, pts.length-1)];
  const curKm    = curPt.KM;

  // Ventana visible: curKm en el centro izquierdo (1/3 desde la izq, como el PCPanel)
  const kmStart = curKm - windowKm * 0.2;
  const kmEnd   = kmStart + windowKm;

  // Puntos visibles
  const visible = pts.filter(p => p.KM >= kmStart - 1 && p.KM <= kmEnd + 1);
  if (!visible.length) return;

  // ── SUAVIZADO (media móvil) ──
  const smoothW = parseInt(document.getElementById('smoothSel').value);
  function smoothAlts(puntos, w) {
    if (w <= 1) return puntos.map(p => p.ALTITUD);
    return puntos.map((p, i) => {
      const half = Math.floor(w / 2);
      const slice = puntos.slice(Math.max(0, i - half), Math.min(puntos.length, i + half + 1));
      const vals = slice.map(x => x.ALTITUD).filter(a => a != null);
      return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : p.ALTITUD;
    });
  }
  const smoothedAlts = smoothAlts(visible, smoothW);
  // Crear versión con altitudes suavizadas para dibujar
  const visibleSmooth = visible.map((p, i) => ({ ...p, ALTITUD: smoothedAlts[i] }));

  // Rango de altitud para escalar
  const alts = visibleSmooth.map(p => p.ALTITUD ?? 0).filter(a => a !== null);
  const altMin = Math.min(...alts) - 10;
  const altMax = Math.max(...alts) + 10;
  const altRange = altMax - altMin || 1;

  // Márgenes del canvas
  const mTop = 28, mBot = 36, mLeft = 0, mRight = 0;
  const drawW = W - mLeft - mRight;
  const drawH = H - mTop - mBot;

  // Funciones de conversión
  const kmToX = km => mLeft + (km - kmStart) / windowKm * drawW;
  const altToY = alt => mTop + drawH - (alt - altMin) / altRange * drawH;

  // ── FONDO ──
  ctx.fillStyle = '#050a0e';
  ctx.fillRect(0, 0, W, H);

  // ── GRID HORIZONTAL ──
  ctx.strokeStyle = 'rgba(0,150,60,0.12)';
  ctx.lineWidth = 1;
  const nGridH = 6;
  for (let i = 0; i <= nGridH; i++) {
    const y = mTop + (drawH / nGridH) * i;
    ctx.beginPath(); ctx.moveTo(mLeft, y); ctx.lineTo(W - mRight, y); ctx.stroke();
    // Etiqueta de altitud
    const altLabel = (altMax - (altRange / nGridH) * i).toFixed(0);
    ctx.fillStyle = 'rgba(0,150,60,0.5)';
    ctx.font = '10px Share Tech Mono, monospace';
    ctx.fillText(altLabel + 'm', 4, y - 2);
  }

  // ── LÍNEAS VERTICALES DE KM (verdes, como en el PCPanel) ──
  const kmStep = windowKm <= 5 ? 1 : windowKm <= 20 ? 2 : 5;
  const kmFirst = Math.ceil(kmStart / kmStep) * kmStep;

  for (let km = kmFirst; km <= kmEnd; km += kmStep) {
    const x = kmToX(km);
    if (x < mLeft || x > W - mRight) continue;

    // Línea verde con efecto "scan" degradado
    const grad = ctx.createLinearGradient(x, mTop, x, mTop + drawH);
    grad.addColorStop(0,   'rgba(0,200,80,0.6)');
    grad.addColorStop(0.5, 'rgba(0,200,80,0.25)');
    grad.addColorStop(1,   'rgba(0,200,80,0.6)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(x, mTop); ctx.lineTo(x, mTop + drawH); ctx.stroke();
    ctx.setLineDash([]);

    // Etiqueta KM arriba
    ctx.fillStyle = '#c0ffd0';
    ctx.font = 'bold 11px Share Tech Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(km.toFixed(0), x, mTop - 6);
  }

  // ── POSICIÓN ACTUAL — línea vertical cyan brillante ──
  const xCur = kmToX(curKm);
  const gradCur = ctx.createLinearGradient(xCur, mTop, xCur, mTop + drawH);
  gradCur.addColorStop(0,   'rgba(0,229,255,0.9)');
  gradCur.addColorStop(0.5, 'rgba(0,229,255,0.4)');
  gradCur.addColorStop(1,   'rgba(0,229,255,0.9)');
  ctx.strokeStyle = gradCur;
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(xCur, mTop); ctx.lineTo(xCur, mTop + drawH); ctx.stroke();
  ctx.shadowBlur = 0;

  // ── RELLENO BAJO LA RASANTE ──
  if (visibleSmooth.length > 1) {
    ctx.beginPath();
    ctx.moveTo(kmToX(visibleSmooth[0].KM), mTop + drawH);
    for (const p of visibleSmooth) {
      if (p.ALTITUD == null) continue;
      ctx.lineTo(kmToX(p.KM), altToY(p.ALTITUD));
    }
    ctx.lineTo(kmToX(visibleSmooth[visibleSmooth.length-1].KM), mTop + drawH);
    ctx.closePath();
    const fillGrad = ctx.createLinearGradient(0, mTop, 0, mTop + drawH);
    fillGrad.addColorStop(0, 'rgba(0,100,160,0.25)');
    fillGrad.addColorStop(1, 'rgba(0,20,40,0.05)');
    ctx.fillStyle = fillGrad;
    ctx.fill();
  }

  // ── RASANTE — línea cyan (el elemento central del PCPanel) ──
  if (visibleSmooth.length > 1) {
    ctx.beginPath();
    let first = true;
    for (const p of visibleSmooth) {
      if (p.ALTITUD == null) continue;
      const x = kmToX(p.KM);
      const y = altToY(p.ALTITUD);
      if (first) { ctx.moveTo(x, y); first = false; }
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ── PENDIENTE — texto sobre la rasante en cada segmento visible ──
  ctx.font = '9px Share Tech Mono, monospace';
  ctx.textAlign = 'center';
  const pStep = Math.max(1, Math.floor(visibleSmooth.length / 12));
  for (let i = pStep; i < visibleSmooth.length - pStep; i += pStep) {
    const a = visibleSmooth[i-1], b = visibleSmooth[i+pStep < visibleSmooth.length ? i+pStep : visibleSmooth.length-1];
    if (a.ALTITUD == null || b.ALTITUD == null) continue;
    const dKm = (b.KM - a.KM) * 1000;
    if (dKm < 1) continue;
    const pend = ((b.ALTITUD - a.ALTITUD) / dKm * 1000);
    const midX = kmToX((a.KM + b.KM) / 2);
    const midY = altToY((a.ALTITUD + b.ALTITUD) / 2) - 10;
    ctx.fillStyle = Math.abs(pend) > 5 ? '#ffab00' : 'rgba(200,255,220,0.6)';
    ctx.fillText(pend.toFixed(1) + '‰', midX, midY);
  }

  // ── PUNTO ACTUAL — marcador rojo ──
  if (curPt.ALTITUD != null) {
    const xP = kmToX(curPt.KM);
    const yP = altToY(curPt.ALTITUD);
    ctx.beginPath();
    ctx.arc(xP, yP, 6, 0, Math.PI*2);
    ctx.fillStyle = '#ff1744';
    ctx.shadowColor = '#ff1744';
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── BARRA DE ESCALA HORIZONTAL ──
  ctx.fillStyle = 'rgba(0,100,60,0.3)';
  ctx.fillRect(mLeft, mTop + drawH, drawW, mBot);
  ctx.strokeStyle = 'rgba(0,150,60,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(mLeft, mTop + drawH); ctx.lineTo(W - mRight, mTop + drawH); ctx.stroke();

  // ── ESTACIONES en la barra inferior ──
  const estDiv = (ESTACIONES[currentDiv] || []);
  const yBase = mTop + drawH; // línea de la vía
  const estaciones_visibles = estDiv.filter(e => e.km >= kmStart && e.km <= kmEnd);

  for (const est of estaciones_visibles) {
    const x = kmToX(est.km);
    if (x < mLeft + 2 || x > W - mRight - 2) continue;

    // Línea vertical COMPLETA de punta a punta (ámbar semitransparente)
    ctx.strokeStyle = 'rgba(255,171,0,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(x, mTop);
    ctx.lineTo(x, mTop + drawH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Triángulo en la barra inferior
    ctx.fillStyle = '#ffab00';
    ctx.beginPath();
    ctx.moveTo(x - 4, yBase + 8);
    ctx.lineTo(x + 4, yBase + 8);
    ctx.lineTo(x, yBase + 14);
    ctx.closePath();
    ctx.fill();

    // Nombre horizontal centrado ARRIBA del triángulo (sobre la barra)
    const estFontSize = parseInt(document.getElementById('estFontSize').value);
    ctx.fillStyle = '#ffdd66';
    ctx.font = `bold ${estFontSize}px Share Tech Mono, monospace`;
    ctx.textAlign = 'center';
    // Fondo negro semitransparente para legibilidad
    const textW = ctx.measureText(est.nombre).width;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(x - textW/2 - 2, yBase - estFontSize - 4, textW + 4, estFontSize + 2);
    ctx.fillStyle = '#ffdd66';
    ctx.fillText(est.nombre, x, yBase - 5);
  }

  // Estación más cercana al cursor — resaltar en el panel izquierdo
  if (estDiv.length > 0) {
    const nearest = estDiv.reduce((best, e) =>
      Math.abs(e.km - curKm) < Math.abs(best.km - curKm) ? e : best
    );
    const distKm = Math.abs(nearest.km - curKm);
    const estEl = document.getElementById('pEstacion');
    if (estEl) {
      if (distKm < 5) {
        const dir = nearest.km > curKm ? '▶' : '◀';
        estEl.textContent = `${dir} ${nearest.nombre} (${distKm.toFixed(1)}km)`;
        estEl.style.display = 'block';
        document.getElementById('pboxEstacion').style.display = 'block';
      } else {
        estEl.style.display = 'none';
        document.getElementById('pboxEstacion').style.display = 'none';
      }
    }
  }

  // ── ACTUALIZAR PANEL IZQUIERDO ──
  const divEl    = document.getElementById('pDiv');
  const kmEl     = document.getElementById('pKm');
  const altEl    = document.getElementById('pAlt');
  const pendEl   = document.getElementById('pPend');
  const velEl    = document.getElementById('pVelMax');
  const pendDisp = document.getElementById('pendienteDisplay');
  const dirDisp  = document.getElementById('dirDisplay');
  const kmLbl    = document.getElementById('kmLabel');

  divEl.textContent = curPt.DIV || '—';
  kmEl.textContent  = curPt.KM.toFixed(3);
  kmLbl.textContent = 'KM ' + curPt.KM.toFixed(3);

  if (curPt.ALTITUD != null) {
    altEl.innerHTML = curPt.ALTITUD.toFixed(1) + '<span class="unit">m</span>';
  } else {
    altEl.innerHTML = 'N/D';
  }

  // Pendiente local (con punto siguiente)
  const nextPt = pts[Math.min(currentIdx + 3, pts.length-1)];
  let pendVal = null;
  if (nextPt && curPt.ALTITUD != null && nextPt.ALTITUD != null) {
    const dKm = (nextPt.KM - curPt.KM) * 1000;
    if (dKm > 0) pendVal = (nextPt.ALTITUD - curPt.ALTITUD) / dKm * 1000;
  }

  const pboxPend = document.getElementById('pboxPend');
  if (pendVal !== null) {
    const ps = pendVal.toFixed(1);
    pendEl.innerHTML = ps + '<span class="unit">‰</span>';
    pendDisp.textContent = 'PEND: ' + ps + '‰';
    if (Math.abs(pendVal) > 10) {
      pboxPend.className = 'pbox alert';
    } else if (Math.abs(pendVal) > 3) {
      pboxPend.className = 'pbox';
      pendEl.style.color = '#ffab00';
    } else {
      pboxPend.className = 'pbox ok';
      pendEl.style.color = '';
    }
  } else {
    pendEl.innerHTML = '—<span class="unit">‰</span>';
    pendDisp.textContent = 'PEND: —';
  }

  // Velocidad máx (si existe en los datos, si no 0)
  const velMax = curPt.VELOCIDAD ?? 0;
  velEl.innerHTML = (velMax || '—') + '<span class="unit">km/h</span>';

  // Dirección
  const dir = curPt.DIRECCION;
  dirDisp.textContent = dir === 1 ? 'DIR: ▶' : dir === 2 ? 'DIR: ◀' : 'DIR: —';
}

// ─────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────
window.addEventListener('resize', draw);

// Teclado: flechas para navegar
window.addEventListener('keydown', e => {
  const pts = divData[currentDiv] || [];
  if (e.key === 'ArrowRight') {
    currentIdx = Math.min(currentIdx + playSpeed, pts.length - 1);
  } else if (e.key === 'ArrowLeft') {
    currentIdx = Math.max(currentIdx - playSpeed, 0);
  } else if (e.key === ' ') {
    togglePlay();
  }
  document.getElementById('sliderKm').value = currentIdx;
  draw();
});

// ─────────────────────────────────────────────────────────────
// INICIO
// ─────────────────────────────────────────────────────────────
loadData();
</script>
</body>
